#BUS_SORT

# NORTH edge — SRAM bus (FFT_USE_SRAM_MACRO mode).
# Cluster all sram_* signals here so the SoC integrator can place two
# 1024x32 SRAM banks (e.g., CF_SRAM_1024x32) above the FFT macro at the
# user_project_wrapper level for clean horizontal routing into bank pins.
# In FF/BRAM-inferred mode (no FFT_USE_SRAM_MACRO define) these ports are
# tied off internally and the cluster is harmless.
#N
sram_clk_o
sram_rwb_o
sram_en_o\[.*\]
sram_addr_o\[.*\]
sram_wdata_o\[.*\]
sram_ben_o\[.*\]
sram_rdata0_i\[.*\]
sram_rdata1_i\[.*\]

# WEST edge — APB slave control interface
#W
psel_i
penable_i
pwrite_i
paddr_i\[.*\]
pwdata_i\[.*\]
prdata_o\[.*\]
pready_o

# EAST edge — AXI data port (Phase 2; tied off in current integrations)
#E
axi_awaddr_i\[.*\]
axi_awvalid_i
axi_awready_o
axi_wdata_i\[.*\]
axi_wvalid_i
axi_wready_o
axi_araddr_i\[.*\]
axi_arvalid_i
axi_arready_o
axi_rdata_o\[.*\]
axi_rvalid_o
axi_rready_i

# SOUTH edge — clocks, resets, and interrupt outputs
#S
clk_i
reset_n_i
pclk_i
preset_n_i
axi_aclk_i
axi_areset_n_i
fft_done_o
fft_error_o
